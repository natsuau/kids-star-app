<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kids Star App</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>⭐ Kids Star App</h1>
        <p class="subtitle">Choose Your Magic Star</p>

        <!-- Menu -->
        <div id="menu">

            <button onclick="openStar('5')">
                ⭐ 5 Pointed Star
            </button>

            <button onclick="openStar('7')">
                ⭐ 7 Pointed Star
            </button>

            <button onclick="openStar('8')">
                ⭐ 8 Pointed Star
            </button>

            <button onclick="openStar('10')">
                ⭐ 10 Pointed Star
            </button>

        </div>

        <!-- Star Screen -->
        <div id="starPage" style="display:none;">

            <h2 id="starTitle"></h2>

            <canvas
                id="starCanvas"
                width="500"
                height="500">
            </canvas>

            <div class="buttonArea">

                <button id="startButton">
                    ▶ Start
                </button>

                <button onclick="backMenu()">
                    ⬅ Back
                </button>

            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
